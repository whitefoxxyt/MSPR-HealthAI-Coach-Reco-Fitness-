name: Docker - Publish to GHCR

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: whitefoxxyt/mspr-reco-fitness

jobs:
  build-and-push:
    name: Build et push de l'image sur GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extraction des métadonnées (tags et labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build et push de l'image
        uses: docker/build-push-action@v5
        with:
          context: ./reco-fitness
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
