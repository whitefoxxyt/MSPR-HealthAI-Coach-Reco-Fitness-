name: CI - Reco-Fitness

on:
  push:
    branches: [master, main]
    tags: ['v*.*.*']
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation de Ruff
        run: pip install ruff==0.8.4

      - name: Linting avec Ruff
        run: ruff check --config reco-fitness/ruff.toml reco-fitness/app reco-fitness/tests

  test:
    name: Tests unitaires (Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            reco-fitness/requirements.txt
            reco-fitness/requirements-dev.txt

      - name: Installation des dépendances
        working-directory: reco-fitness
        run: pip install -r requirements-dev.txt

      - name: Tests unitaires (hors slow et integration)
        working-directory: reco-fitness
        run: pytest -m "not slow and not integration" -v

  publish:
    name: Publication de l'image Docker
    needs: [lint, test]
    if: github.event_name == 'push'
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
