[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]
testpaths = ["tests"]
addopts = "--cov=app --cov-report=html --cov-report=term-missing --cov-fail-under=0"
markers = [
    "slow: tests reseau reels ou necessitant des ressources externes (deselectes par defaut en CI)",
    "integration: tests avec containers Docker ephemeres",
    "unit: tests unitaires rapides sans dependances externes",
]

[tool.coverage.run]
source = ["app"]
omit = ["app/data/*"]

[tool.coverage.report]
show_missing = true
# Seuil 80% impose par la CI uniquement : pytest -m "not slow" --cov-fail-under=80
# Les tests unitaires seuls couvrent ~63% (normal : routers et main couverts en integration)

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
